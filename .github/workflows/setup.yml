name: SteadyStackAI Platform Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'setup'
        type: choice
        options:
          - setup
          - setup-monitoring
          - setup-elk
          - setup-jewelhub
          - destroy

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER: steadystackai-cluster

jobs:
  # =====================
  # FULL SETUP
  # =====================
  setup:
    name: Full Setup
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout SteadyStackAI
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Apply
      working-directory: infrastructure/terraform
      run: |
        terraform init
        terraform apply -auto-approve

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm and repos
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo add elastic https://helm.elastic.co
        helm repo update

    - name: Create namespaces
      run: |
        kubectl create namespace monitoring \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace logging \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace jewelhub \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Install Prometheus and Grafana
      run: |
        helm upgrade --install prometheus \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.adminPassword=JewelHub@2025 \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --wait --timeout=10m
        kubectl patch svc prometheus-grafana \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl patch svc prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'

    - name: Install ELK Stack
      run: |
        helm upgrade --install elasticsearch \
          elastic/elasticsearch \
          --namespace logging \
          --set replicas=1 \
          --set minimumMasterNodes=1 \
          --set resources.requests.memory=256Mi \
          --set resources.limits.memory=512Mi \
          --set resources.requests.cpu=100m \
          --set resources.limits.cpu=300m \
          --set esJavaOpts="-Xmx256m -Xms256m" \
          --set persistence.enabled=false

        helm upgrade --install kibana \
          elastic/kibana \
          --namespace logging \
          --set resources.requests.memory=256Mi \
          --set resources.limits.memory=512Mi \
          --set service.type=LoadBalancer

        helm upgrade --install filebeat \
          elastic/filebeat \
          --namespace logging

        echo "⏳ Waiting for Elasticsearch..."
        kubectl rollout status statefulset/elasticsearch-master \
          -n logging --timeout=20m

        echo "⏳ Waiting for Kibana..."
        kubectl rollout status deployment/kibana-kibana \
          -n logging --timeout=10m

        echo "✅ ELK Stack ready!"

    - name: Apply Alert Rules
      run: |
        kubectl apply -f \
          observability/prometheus/jewelhub-alerts.yaml

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Clone JewelHub
      run: |
        git clone https://github.com/Venky0410/JewelHub.git
        echo "Latest commit:"
        cd JewelHub && git log --oneline -5

    - name: Set image tag
      run: |
        cd JewelHub
        echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build and push all services
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        for service in \
          product-service \
          cart-service \
          order-service \
          user-service \
          notification-service \
          frontend; do
          echo "Building $service..."
          docker build \
            -t $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }} \
            ./$service
          docker push \
            $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }}
          echo "✅ $service pushed!"
        done

    - name: Deploy JewelHub
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g"
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|:latest|:${{ env.IMAGE_TAG }}|g"
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/product-service/
        kubectl apply -f k8s/cart-service/
        kubectl apply -f k8s/order-service/
        kubectl apply -f k8s/user-service/
        kubectl apply -f k8s/notification-service/
        kubectl apply -f k8s/frontend/
        kubectl rollout status deployment/frontend \
          -n jewelhub --timeout=5m
        echo "✅ JewelHub deployed!"

    - name: Wait for Load Balancers
      run: sleep 90

    - name: Get All URLs
      run: |
        GRAFANA_URL=$(kubectl get svc prometheus-grafana \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        PROMETHEUS_URL=$(kubectl get svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        KIBANA_URL=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        JEWELHUB_URL=$(kubectl get svc frontend \
          -n jewelhub \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        echo "## 🚀 SteadyStackAI Platform Ready!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 💍 JewelHub | http://$JEWELHUB_URL | - |" >> $GITHUB_STEP_SUMMARY
        echo "| 📊 Grafana | http://$GRAFANA_URL | admin/JewelHub@2025 |" >> $GITHUB_STEP_SUMMARY
        echo "| 📈 Prometheus | http://$PROMETHEUS_URL:9090 | - |" >> $GITHUB_STEP_SUMMARY
        echo "| 📋 Kibana | http://$KIBANA_URL:5601 | elastic/check secret |" >> $GITHUB_STEP_SUMMARY
        echo "**Setup completed at:** $(date)" >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: MONITORING ONLY
  # =====================
  setup-monitoring:
    name: Setup Monitoring Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-monitoring'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Install Prometheus and Grafana
      run: |
        kubectl create namespace monitoring \
          --dry-run=client -o yaml | kubectl apply -f -
        helm upgrade --install prometheus \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.adminPassword=JewelHub@2025 \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --wait --timeout=10m
        kubectl patch svc prometheus-grafana \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl patch svc prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl apply -f \
          observability/prometheus/jewelhub-alerts.yaml
        echo "✅ Monitoring ready!"

    - name: Get Monitoring URLs
      run: |
        sleep 60
        GRAFANA_URL=$(kubectl get svc prometheus-grafana \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        PROMETHEUS_URL=$(kubectl get svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "## 📊 Monitoring Ready!" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 📊 Grafana | http://$GRAFANA_URL | admin/JewelHub@2025 |" >> $GITHUB_STEP_SUMMARY
        echo "| 📈 Prometheus | http://$PROMETHEUS_URL:9090 | - |" >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: ELK ONLY
  # =====================
  setup-elk:
    name: Setup ELK Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-elk'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add elastic https://helm.elastic.co
        helm repo update

    - name: Install Elasticsearch
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account --output text)
        ECR_URL="$ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com"

        # Login to ECR
        aws ecr get-login-password \
          --region eu-west-1 | \
          docker login --username AWS \
          --password-stdin $ECR_URL

        helm upgrade --install elasticsearch \
          elastic/elasticsearch \
          --version 7.17.3 \
          --namespace logging \
          --set replicas=1 \
          --set minimumMasterNodes=1 \
          --set resources.requests.memory=512Mi \
          --set resources.limits.memory=2Gi \
          --set esJavaOpts="-Xmx1g -Xms1g" \
          --set persistence.enabled=false \
          --set "image=$ECR_URL/elasticsearch-cache" \
          --set "imageTag=7.17.3"

        echo "⏳ Waiting for Elasticsearch pod..."
        kubectl wait pod/elasticsearch-master-0 \
          --for=condition=ready \
          -n logging \
          --timeout=15m

        echo "⏳ Verifying Elasticsearch API..."
        for i in {1..20}; do
          STATUS=$(kubectl exec \
            -n logging \
            elasticsearch-master-0 \
            -- curl -s -o /dev/null \
            -w "%{http_code}" \
            http://localhost:9200 2>/dev/null)
          echo "Attempt $i: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Elasticsearch API ready!"
            break
          fi
          sleep 15
        done

    - name: Install Kibana
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account --output text)
        ECR_URL="$ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com"

        helm upgrade --install kibana \
          elastic/kibana \
          --version 7.17.3 \
          --namespace logging \
          --set resources.requests.memory=256Mi \
          --set resources.limits.memory=1Gi \
          --set service.type=LoadBalancer \
          --set elasticsearchHosts="http://elasticsearch-master:9200" \
          --set "image=$ECR_URL/kibana-cache" \
          --set "imageTag=7.17.3"
        echo "⏳ Waiting for Kibana..."
        kubectl rollout status deployment/kibana-kibana \
          -n logging --timeout=10m
        echo "✅ Kibana ready!"

    - name: Install Filebeat
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account --output text)
        ECR_URL="$ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com"

        helm upgrade --install filebeat \
          elastic/filebeat \
          --version 7.17.3 \
          --namespace logging \
          --set "image=$ECR_URL/filebeat-cache" \
          --set "imageTag=7.17.3"
        echo "✅ Filebeat ready!"
    - name: Get Kibana URL
      run: |
        sleep 60
        KIBANA_URL=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        KIBANA_PASS=$(kubectl get secret \
          elasticsearch-master-credentials \
          -n logging \
          -o jsonpath='{.data.password}' | base64 --decode)
        echo "## 📋 ELK Stack Ready!" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 📋 Kibana | http://$KIBANA_URL:5601 | elastic/$KIBANA_PASS |" >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: JEWELHUB ONLY
  # =====================
  setup-jewelhub:
    name: Deploy JewelHub Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-jewelhub'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Clone JewelHub
      run: |
        git clone https://github.com/Venky0410/JewelHub.git
        echo "Latest commits:"
        cd JewelHub && git log --oneline -5

    - name: Set image tag
      run: |
        cd JewelHub
        echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build and push all services
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        for service in \
          product-service \
          cart-service \
          order-service \
          user-service \
          notification-service \
          frontend; do
          echo "Building $service..."
          docker build \
            -t $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }} \
            ./$service
          docker push \
            $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }}
          echo "✅ $service pushed!"
        done

    - name: Deploy JewelHub
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g"
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|:latest|:${{ env.IMAGE_TAG }}|g"
        kubectl create namespace jewelhub \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/product-service/
        kubectl apply -f k8s/cart-service/
        kubectl apply -f k8s/order-service/
        kubectl apply -f k8s/user-service/
        kubectl apply -f k8s/notification-service/
        kubectl apply -f k8s/frontend/
        kubectl rollout status deployment/frontend \
          -n jewelhub --timeout=5m
        echo "✅ JewelHub deployed with tag: ${{ env.IMAGE_TAG }}"

    - name: Get JewelHub URL
      run: |
        sleep 60
        URL=$(kubectl get svc frontend \
          -n jewelhub \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "## 💍 JewelHub Deployed!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🌍 URL | http://$URL |" >> $GITHUB_STEP_SUMMARY
        echo "| 🏷️ Tag | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ⏰ Time | $(date) |" >> $GITHUB_STEP_SUMMARY

  # =====================
  # DESTROY
  # =====================
  destroy:
    name: Destroy Everything
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Delete K8s Load Balancers
      run: |
        CLUSTER_EXISTS=$(aws eks describe-cluster \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }} \
          --query 'cluster.status' \
          --output text 2>/dev/null || echo "NOT_FOUND")

        if [ "$CLUSTER_EXISTS" != "NOT_FOUND" ]; then
          echo "✅ EKS found - deleting K8s services..."
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}
          kubectl delete svc --all -n jewelhub || true
          kubectl delete svc --all -n monitoring || true
          kubectl delete svc --all -n logging || true
          echo "Waiting 120 seconds for LBs to delete..."
          sleep 120
        else
          echo "⚠️ No EKS cluster found"
        fi

        # Always delete ALL classic LBs
        echo "Deleting any remaining classic LBs..."
        aws elb describe-load-balancers \
          --region ${{ env.AWS_REGION }} \
          --query 'LoadBalancerDescriptions[*].LoadBalancerName' \
          --output text | tr '\t' '\n' | while read lb; do
            if [ ! -z "$lb" ]; then
              echo "Deleting LB: $lb"
              aws elb delete-load-balancer \
                --load-balancer-name $lb \
                --region ${{ env.AWS_REGION }} || true
            fi
        done

        # Wait for LBs to fully delete
        echo "Final wait 90 seconds..."
        sleep 90

        # Verify LBs gone
        REMAINING=$(aws elb describe-load-balancers \
          --region ${{ env.AWS_REGION }} \
          --query 'LoadBalancerDescriptions[*].LoadBalancerName' \
          --output text)
        if [ ! -z "$REMAINING" ]; then
          echo "⚠️ LBs still deleting, waiting 60 more seconds..."
          sleep 60
        fi
        echo "✅ All LBs deleted!"
 
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Destroy
      working-directory: infrastructure/terraform
      run: |
        terraform init
        terraform destroy -auto-approve

    - name: Platform Destroyed
      run: |
        echo "## 💥 Platform Destroyed!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All AWS resources deleted!" >> $GITHUB_STEP_SUMMARY
        echo "💰 No more charges!" >> $GITHUB_STEP_SUMMARY
        echo "**Destroyed at:** $(date)" >> $GITHUB_STEP_SUMMARY
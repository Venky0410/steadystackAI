name: SteadyStackAI Platform Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'setup'
        type: choice
        options:
          - setup
          - setup-monitoring
          - setup-elk
          - setup-jewelhub
          - destroy

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER: steadystackai-cluster

jobs:
  # =====================
  # STAGE 1 - INFRASTRUCTURE
  # =====================
  infrastructure:
    name: 🏗️ Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout SteadyStackAI
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Apply
      working-directory: infrastructure/terraform
      run: |
        terraform init
        terraform apply -auto-approve

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Create namespaces
      run: |
        kubectl create namespace monitoring \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace logging \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace jewelhub \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace steadystackai \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "✅ Infrastructure ready!"

  # =====================
  # STAGE 2 - MONITORING (parallel with ELK)
  # =====================
  monitoring:
    name: 📊 Monitoring
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Install Prometheus and Grafana
      run: |
        helm upgrade --install prometheus \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.adminPassword=JewelHub@2025 \
          --set grafana.sidecar.dashboards.enabled=true \
          --set grafana.sidecar.dashboards.label=grafana_dashboard \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --wait --timeout=10m
        kubectl patch svc prometheus-grafana \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl patch svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'

    - name: Apply Alert Rules and SLOs
      run: |
        kubectl apply -f \
          observability/prometheus/jewelhub-alerts.yaml
        kubectl apply -f \
          observability/slos/slo-rules.yaml
        kubectl apply -f \
          observability/slos/burn-rate-alerts.yaml
        kubectl apply -f \
          observability/grafana/slo-dashboard-configmap.yaml
        kubectl apply -f \
          observability/prometheus/jewelhub-servicemonitor.yaml
        kubectl apply -f \
          observability/prometheus/alertmanager-config.yaml
        echo "✅ Monitoring ready!"

  # =====================
  # STAGE 2 - ELK (parallel with monitoring)
  # =====================
  elk:
    name: 📋 ELK Stack
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add elastic https://helm.elastic.co
        helm repo update

    - name: Install Elasticsearch
      run: |
        kubectl delete namespace logging \
          --force 2>/dev/null || true
        kubectl wait \
          --for=delete namespace/logging \
          --timeout=60s 2>/dev/null || true
        kubectl create namespace logging

        helm upgrade --install elasticsearch \
          elastic/elasticsearch \
          --version 7.17.3 \
          --namespace logging \
          --set replicas=1 \
          --set minimumMasterNodes=1 \
          --set resources.requests.memory=512Mi \
          --set resources.limits.memory=2Gi \
          --set esJavaOpts="-Xmx1g -Xms1g" \
          --set persistence.enabled=false

        until kubectl get pod elasticsearch-master-0 \
          -n logging \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "Pod not ready yet..."
          sleep 10
        done

        until kubectl exec \
          -n logging elasticsearch-master-0 \
          -- curl -s http://localhost:9200 \
          2>/dev/null | grep -q "You Know, for Search"; do
          echo "API not ready yet..."
          sleep 10
        done
        echo "✅ Elasticsearch ready!"

    - name: Install Kibana
      run: |
        kubectl delete jobs -n logging \
          --field-selector status.successful=0 \
          2>/dev/null || true
        sleep 5

        helm upgrade --install kibana \
          elastic/kibana \
          --version 7.17.3 \
          --namespace logging \
          --no-hooks \
          --set resources.requests.memory=256Mi \
          --set resources.limits.memory=1Gi \
          --set service.type=LoadBalancer \
          --set elasticsearchHosts="http://elasticsearch-master:9200"

        until kubectl get deployment kibana-kibana \
          -n logging \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "Kibana not ready yet..."
          sleep 10
        done
        echo "✅ Kibana ready!"

    - name: Install Filebeat
      run: |
        helm upgrade --install filebeat \
          elastic/filebeat \
          --version 7.17.3 \
          --namespace logging

        until kubectl get daemonset filebeat-filebeat \
          -n logging \
          -o jsonpath='{.status.numberReady}' \
          2>/dev/null | grep -qv "^0$\|^$"; do
          echo "Filebeat not ready yet..."
          sleep 10
        done
        echo "✅ Filebeat ready!"

    - name: Create Kibana Index Patterns
      run: |
        KIBANA=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        until curl -s \
          http://$KIBANA:5601/api/status \
          2>/dev/null | grep -q "green"; do
          echo "Kibana not ready..."
          sleep 10
        done

        curl -s -X POST \
          http://$KIBANA:5601/api/saved_objects/index-pattern \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "attributes": {
              "title": "filebeat-*",
              "timeFieldName": "@timestamp"
            }
          }'

        curl -s -X POST \
          http://$KIBANA:5601/api/saved_objects/index-pattern \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "attributes": {
              "title": "steadystackai-postmortems",
              "timeFieldName": "@timestamp"
            }
          }'
        echo "✅ Kibana index patterns created!"

  # =====================
  # STAGE 3 - JEWELHUB
  # =====================
  jewelhub:
    name: 💍 JewelHub
    runs-on: ubuntu-latest
    needs: [monitoring, elk]
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Clone JewelHub
      run: |
        git clone https://github.com/Venky0410/JewelHub.git
        cd JewelHub && git log --oneline -5

    - name: Set image tag
      run: |
        cd JewelHub
        echo "IMAGE_TAG=$(git rev-parse --short HEAD)" \
          >> $GITHUB_ENV

    - name: Build and push all services
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        IMAGE_EXISTS=$(aws ecr describe-images \
          --repository-name jewelhub-frontend \
          --image-ids imageTag=${{ env.IMAGE_TAG }} \
          --region eu-west-1 \
          --query 'imageDetails[0].imageTags[0]' \
          --output text 2>/dev/null || echo "NOT_FOUND")

        if [ "$IMAGE_EXISTS" = "${{ env.IMAGE_TAG }}" ]; then
          echo "✅ Images exist! Skipping build..."
        else
          for service in \
            product-service cart-service \
            order-service user-service \
            notification-service frontend; do
            echo "Building $service..."
            docker build \
              -t $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }} \
              ./$service
            docker push \
              $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }}
            echo "✅ $service pushed!"
          done
        fi

    - name: Deploy JewelHub
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g"
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|:latest|:${{ env.IMAGE_TAG }}|g"
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/product-service/
        kubectl apply -f k8s/cart-service/
        kubectl apply -f k8s/order-service/
        kubectl apply -f k8s/user-service/
        kubectl apply -f k8s/notification-service/
        kubectl apply -f k8s/frontend/

        until kubectl get deployment frontend \
          -n jewelhub \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "Frontend not ready yet..."
          sleep 15
        done
        echo "✅ JewelHub deployed!"

  # =====================
  # STAGE 4 - AI LAYER
  # =====================
  ai-layer:
    name: 🤖 AI Layer
    runs-on: ubuntu-latest
    needs: jewelhub
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push AI Layer
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build \
          -t $ECR_REGISTRY/steadystackai-ai-layer:latest \
          ./ai-layer
        docker push \
          $ECR_REGISTRY/steadystackai-ai-layer:latest
        echo "✅ AI Layer image pushed!"

    - name: Deploy AI Layer
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account --output text)

        kubectl create namespace steadystackai \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic ai-layer-secrets \
          --from-literal=claude-api-key=${{ secrets.CLAUDE_API_KEY }} \
          -n steadystackai \
          --dry-run=client -o yaml | kubectl apply -f -

        find ./ai-layer/k8s -name "*.yaml" | \
          xargs sed -i \
          "s|ACCOUNT_ID|$ACCOUNT_ID|g"

        kubectl apply -f ai-layer/k8s/deployment.yaml
        kubectl apply -f ai-layer/k8s/service.yaml

        until kubectl get deployment ai-layer \
          -n steadystackai \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "AI Layer not ready yet..."
          sleep 15
        done
        echo "✅ AI Layer deployed!"

  # =====================
  # STAGE 5 - SUMMARY
  # =====================
  summary:
    name: 🚀 Platform Ready
    runs-on: ubuntu-latest
    needs: [monitoring, elk, jewelhub, ai-layer]
    if: github.event.inputs.action == 'setup'

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Wait for Load Balancers
      run: |
        for svc in \
          "prometheus-grafana monitoring" \
          "frontend jewelhub" \
          "kibana-kibana logging"; do
          name=$(echo $svc | cut -d' ' -f1)
          ns=$(echo $svc | cut -d' ' -f2)
          until kubectl get svc $name \
            -n $ns \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
            2>/dev/null | grep -q "elb.amazonaws.com"; do
            echo "$name not ready yet..."
            sleep 15
          done
          echo "✅ $name ready!"
        done

    - name: Get All URLs
      run: |
        GRAFANA=$(kubectl get svc prometheus-grafana \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        PROMETHEUS=$(kubectl get svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        KIBANA=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        JEWELHUB=$(kubectl get svc frontend \
          -n jewelhub \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        echo "## 🚀 SteadyStackAI Platform Ready!" \
          >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 💍 JewelHub | http://$JEWELHUB | - |" \
          >> $GITHUB_STEP_SUMMARY
        echo "| 📊 Grafana | http://$GRAFANA | admin/JewelHub@2025 |" \
          >> $GITHUB_STEP_SUMMARY
        echo "| 📈 Prometheus | http://$PROMETHEUS:9090 | - |" \
          >> $GITHUB_STEP_SUMMARY
        echo "| 📋 Kibana | http://$KIBANA:5601 | No login needed |" \
          >> $GITHUB_STEP_SUMMARY
        echo "| 🤖 AI Layer | Internal ClusterIP | - |" \
          >> $GITHUB_STEP_SUMMARY
        echo "**Setup completed at:** $(date)" >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: MONITORING ONLY
  # =====================
  setup-monitoring:
    name: 📊 Setup Monitoring Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-monitoring'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Install Prometheus and Grafana
      run: |
        kubectl create namespace monitoring \
          --dry-run=client -o yaml | kubectl apply -f -
        helm upgrade --install prometheus \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.adminPassword=JewelHub@2025 \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --wait --timeout=10m
        kubectl patch svc prometheus-grafana \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl patch svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -p '{"spec": {"type": "LoadBalancer"}}'
        kubectl apply -f \
          observability/prometheus/jewelhub-alerts.yaml
        kubectl apply -f \
          observability/slos/slo-rules.yaml
        kubectl apply -f \
          observability/slos/burn-rate-alerts.yaml
        kubectl apply -f \
          observability/grafana/slo-dashboard-configmap.yaml
        kubectl apply -f \
          observability/prometheus/jewelhub-servicemonitor.yaml
        kubectl apply -f \
          observability/prometheus/alertmanager-config.yaml
        echo "✅ Monitoring ready!"

    - name: Get Monitoring URLs
      run: |
        sleep 60
        GRAFANA=$(kubectl get svc prometheus-grafana \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        PROMETHEUS=$(kubectl get svc \
          prometheus-kube-prometheus-prometheus \
          -n monitoring \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "## 📊 Monitoring Ready!" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 📊 Grafana | http://$GRAFANA | admin/JewelHub@2025 |" \
          >> $GITHUB_STEP_SUMMARY
        echo "| 📈 Prometheus | http://$PROMETHEUS:9090 | - |" \
          >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: ELK ONLY
  # =====================
  setup-elk:
    name: 📋 Setup ELK Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-elk'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add elastic https://helm.elastic.co
        helm repo update

    - name: Install Elasticsearch
      run: |
        kubectl delete namespace logging \
          --force 2>/dev/null || true
        kubectl wait \
          --for=delete namespace/logging \
          --timeout=60s 2>/dev/null || true
        kubectl create namespace logging

        helm upgrade --install elasticsearch \
          elastic/elasticsearch \
          --version 7.17.3 \
          --namespace logging \
          --set replicas=1 \
          --set minimumMasterNodes=1 \
          --set resources.requests.memory=512Mi \
          --set resources.limits.memory=2Gi \
          --set esJavaOpts="-Xmx1g -Xms1g" \
          --set persistence.enabled=false

        until kubectl get pod elasticsearch-master-0 \
          -n logging \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "Pod not ready yet..."
          sleep 10
        done

        until kubectl exec \
          -n logging elasticsearch-master-0 \
          -- curl -s http://localhost:9200 \
          2>/dev/null | grep -q "You Know, for Search"; do
          echo "API not ready yet..."
          sleep 10
        done
        echo "✅ Elasticsearch ready!"

    - name: Install Kibana
      run: |
        kubectl delete jobs -n logging \
          --field-selector status.successful=0 \
          2>/dev/null || true
        sleep 5

        helm upgrade --install kibana \
          elastic/kibana \
          --version 7.17.3 \
          --namespace logging \
          --no-hooks \
          --set resources.requests.memory=256Mi \
          --set resources.limits.memory=1Gi \
          --set service.type=LoadBalancer \
          --set elasticsearchHosts="http://elasticsearch-master:9200"

        until kubectl get deployment kibana-kibana \
          -n logging \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "Kibana not ready yet..."
          sleep 10
        done
        echo "✅ Kibana ready!"

    - name: Install Filebeat
      run: |
        helm upgrade --install filebeat \
          elastic/filebeat \
          --version 7.17.3 \
          --namespace logging

        until kubectl get daemonset filebeat-filebeat \
          -n logging \
          -o jsonpath='{.status.numberReady}' \
          2>/dev/null | grep -qv "^0$\|^$"; do
          echo "Filebeat not ready yet..."
          sleep 10
        done
        echo "✅ Filebeat ready!"

    - name: Create Kibana Index Patterns
      run: |
        KIBANA=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        until curl -s \
          http://$KIBANA:5601/api/status \
          2>/dev/null | grep -q "green"; do
          echo "Kibana not ready..."
          sleep 10
        done

        curl -s -X POST \
          http://$KIBANA:5601/api/saved_objects/index-pattern \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "attributes": {
              "title": "filebeat-*",
              "timeFieldName": "@timestamp"
            }
          }'

        curl -s -X POST \
          http://$KIBANA:5601/api/saved_objects/index-pattern \
          -H "kbn-xsrf: true" \
          -H "Content-Type: application/json" \
          -d '{
            "attributes": {
              "title": "steadystackai-postmortems",
              "timeFieldName": "@timestamp"
            }
          }'
        echo "✅ Kibana index patterns created!"

    - name: Get Kibana URL
      run: |
        sleep 30
        KIBANA=$(kubectl get svc kibana-kibana \
          -n logging \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "## 📋 ELK Stack Ready!" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL | Login |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 📋 Kibana | http://$KIBANA:5601 | No login needed |" \
          >> $GITHUB_STEP_SUMMARY

  # =====================
  # RESUME: JEWELHUB ONLY
  # =====================
  setup-jewelhub:
    name: 💍 Deploy JewelHub Only
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'setup-jewelhub'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Clone JewelHub
      run: |
        git clone https://github.com/Venky0410/JewelHub.git
        cd JewelHub && git log --oneline -5

    - name: Set image tag
      run: |
        cd JewelHub
        echo "IMAGE_TAG=$(git rev-parse --short HEAD)" \
          >> $GITHUB_ENV

    - name: Build and push all services
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        for service in \
          product-service cart-service \
          order-service user-service \
          notification-service frontend; do
          echo "Building $service..."
          docker build \
            -t $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }} \
            ./$service
          docker push \
            $ECR_REGISTRY/jewelhub-$service:${{ env.IMAGE_TAG }}
          echo "✅ $service pushed!"
        done

    - name: Deploy JewelHub
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd JewelHub
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g"
        find ./k8s -name "*.yaml" | xargs sed -i \
          "s|:latest|:${{ env.IMAGE_TAG }}|g"
        kubectl delete deployment \
          frontend product-service cart-service \
          order-service user-service notification-service \
          -n jewelhub 2>/dev/null || true
        sleep 30
        kubectl create namespace jewelhub \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/product-service/
        kubectl apply -f k8s/cart-service/
        kubectl apply -f k8s/order-service/
        kubectl apply -f k8s/user-service/
        kubectl apply -f k8s/notification-service/
        kubectl apply -f k8s/frontend/

        for deployment in \
          frontend product-service cart-service \
          order-service user-service notification-service; do
          until kubectl get deployment $deployment \
            -n jewelhub \
            -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
            2>/dev/null | grep -q "True"; do
            echo "$deployment not ready yet..."
            sleep 15
          done
          echo "✅ $deployment ready!"
        done
        echo "✅ JewelHub deployed!"

    - name: Build and Push AI Layer
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build \
          -t $ECR_REGISTRY/steadystackai-ai-layer:latest \
          ./ai-layer
        docker push \
          $ECR_REGISTRY/steadystackai-ai-layer:latest
        echo "✅ AI Layer image pushed!"

    - name: Deploy AI Layer
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account --output text)
        kubectl create namespace steadystackai \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic ai-layer-secrets \
          --from-literal=claude-api-key=${{ secrets.CLAUDE_API_KEY }} \
          -n steadystackai \
          --dry-run=client -o yaml | kubectl apply -f -
        find ./ai-layer/k8s -name "*.yaml" | \
          xargs sed -i \
          "s|ACCOUNT_ID|$ACCOUNT_ID|g"
        kubectl apply -f ai-layer/k8s/deployment.yaml
        kubectl apply -f ai-layer/k8s/service.yaml
        until kubectl get deployment ai-layer \
          -n steadystackai \
          -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' \
          2>/dev/null | grep -q "True"; do
          echo "AI Layer not ready yet..."
          sleep 15
        done
        echo "✅ AI Layer deployed!"

    - name: Get JewelHub URL
      run: |
        until kubectl get svc frontend \
          -n jewelhub \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
          2>/dev/null | grep -q "elb.amazonaws.com"; do
          echo "URL not ready yet..."
          sleep 15
        done
        URL=$(kubectl get svc frontend \
          -n jewelhub \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "## 💍 JewelHub Deployed!" >> $GITHUB_STEP_SUMMARY
        echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🌍 URL | http://$URL |" >> $GITHUB_STEP_SUMMARY
        echo "| 🏷️ Tag | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ⏰ Time | $(date) |" >> $GITHUB_STEP_SUMMARY

  # =====================
  # DESTROY
  # =====================
  destroy:
    name: 💥 Destroy Everything
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install kubectl
      run: |
        curl -LO \
          "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Delete K8s Load Balancers
      run: |
        CLUSTER_EXISTS=$(aws eks describe-cluster \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }} \
          --query 'cluster.status' \
          --output text 2>/dev/null || echo "NOT_FOUND")

        if [ "$CLUSTER_EXISTS" != "NOT_FOUND" ]; then
          echo "✅ EKS found - deleting K8s services..."
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}
          kubectl delete svc --all -n jewelhub || true
          kubectl delete svc --all -n monitoring || true
          kubectl delete svc --all -n logging || true
          kubectl delete svc --all -n steadystackai || true
          echo "Waiting 120 seconds for LBs to delete..."
          sleep 120
        else
          echo "⚠️ No EKS cluster found"
        fi

        echo "Deleting any remaining classic LBs..."
        aws elb describe-load-balancers \
          --region ${{ env.AWS_REGION }} \
          --query 'LoadBalancerDescriptions[*].LoadBalancerName' \
          --output text | tr '\t' '\n' | while read lb; do
            if [ ! -z "$lb" ]; then
              echo "Deleting LB: $lb"
              aws elb delete-load-balancer \
                --load-balancer-name $lb \
                --region ${{ env.AWS_REGION }} || true
            fi
        done

        echo "Final wait 90 seconds..."
        sleep 90

        REMAINING=$(aws elb describe-load-balancers \
          --region ${{ env.AWS_REGION }} \
          --query 'LoadBalancerDescriptions[*].LoadBalancerName' \
          --output text)
        if [ ! -z "$REMAINING" ]; then
          echo "⚠️ LBs still deleting..."
          sleep 60
        fi
        echo "✅ All LBs deleted!"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Destroy
      working-directory: infrastructure/terraform
      run: |
        terraform init
        terraform destroy -auto-approve

    - name: Platform Destroyed
      run: |
        echo "## 💥 Platform Destroyed!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All AWS resources deleted!" >> $GITHUB_STEP_SUMMARY
        echo "💰 No more charges!" >> $GITHUB_STEP_SUMMARY
        echo "**Destroyed at:** $(date)" >> $GITHUB_STEP_SUMMARY
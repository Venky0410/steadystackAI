apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-layer
  namespace: steadystackai
  labels:
    app: ai-layer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-layer
  template:
    metadata:
      labels:
        app: ai-layer
    spec:
      containers:
      - name: ai-layer
        image: ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com/steadystackai-ai-layer:latest
        ports:
        - containerPort: 8080
        env:
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-layer-secrets
              key: claude-api-key
        - name: PROMETHEUS_URL
          value: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch-master.logging:9200"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
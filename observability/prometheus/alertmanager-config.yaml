apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-prometheus-kube-prometheus-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'ai-layer'
      routes:
      - matchers:
        - severity=~"warning|critical"
        receiver: 'ai-layer'
    receivers:
    - name: 'ai-layer'
      webhook_configs:
      - url: 'http://ai-layer.steadystackai:8080/webhook'
        send_resolved: false
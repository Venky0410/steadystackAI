apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jewelhub-monitor
  namespace: monitoring
  labels:
    app: jewelhub
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - jewelhub
  selector:
    matchLabels: {}
  endpoints:
  - port: http
    path: /metrics
    interval: 15s